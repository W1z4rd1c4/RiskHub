# Pre-commit Configuration for RiskHub
# See: https://pre-commit.com/
#
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

default_language_version:
  python: python3.13

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  # Python formatting
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--config=backend/ruff.toml]
        files: ^(backend/app|tests/backend/pytest|backend/scripts)/.*\.py$
      - id: ruff
        name: Ruff (manual autofix)
        args: [--config=backend/ruff.toml, --fix]
        files: ^(backend/app|tests/backend/pytest|backend/scripts)/.*\.py$
        stages: [manual]

  # Python security - Bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["--ini", "backend/.bandit"]
        files: ^backend/app/.*\.py$

  # Secrets detection - Gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  # Frontend linting
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: npm run lint
        language: system
        files: \.(js|jsx|ts|tsx)$
        pass_filenames: false
        args: ["--prefix", "frontend"]
      - id: frontend-debt-budget
        name: Frontend Debt Budget
        entry: npm run quality:debt
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
        args: ["--prefix", "frontend"]
