# RiskHub E2E Testing Workflow
# Runs Playwright E2E tests on PRs and pushes

name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    services:
      postgres:
        image: postgres:15@sha256:c635fa3e3b7421a659d34abdfd6d492f679cbe8149e261a501237b55c5a94212
        env:
          POSTGRES_USER: riskhub
          POSTGRES_PASSWORD: riskhub_test
          POSTGRES_DB: riskhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Classify E2E scope
        id: e2e-scope
        run: |
          set -euo pipefail
          run_e2e=true
          base_ref=""

          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base_ref="${{ github.event.before }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="origin/${{ github.base_ref }}"
          fi

          if [ -n "$base_ref" ] && git rev-parse --verify "$base_ref^{commit}" >/dev/null 2>&1; then
            mapfile -t changed_paths < <(git diff --name-only --diff-filter=ACMRTUXB "$base_ref" HEAD)
            run_e2e=false

            if [ "${#changed_paths[@]}" -eq 0 ]; then
              run_e2e=true
            fi

            for path in "${changed_paths[@]}"; do
              case "$path" in
                backend/*|frontend/*|tests/frontend/e2e/*|backend/scripts/seed_e2e_*|scripts/install.sh|scripts/dev.sh|scripts/compose.sh|scripts/Makefile|docker-compose.yml|.github/workflows/e2e.yml)
                  run_e2e=true
                  break
                  ;;
              esac
            done
          fi

          if [ "$run_e2e" = "true" ]; then
            echo "run-e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run-e2e=false" >> "$GITHUB_OUTPUT"
          fi
          printf 'E2E scope requires full Playwright run: %s\n' "$run_e2e"

      - name: Skip Playwright E2E for docs-only changes
        if: steps.e2e-scope.outputs.run-e2e != 'true'
        run: echo "Skipping Playwright E2E because this change does not touch product, E2E, startup, or workflow surfaces."

      - name: Set up Python
        if: steps.e2e-scope.outputs.run-e2e == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt

      - name: Set up Node.js
        if: steps.e2e-scope.outputs.run-e2e == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        if: steps.e2e-scope.outputs.run-e2e == 'true'
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        if: steps.e2e-scope.outputs.run-e2e == 'true'
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        if: steps.e2e-scope.outputs.run-e2e == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Detect system Chrome
        id: system-chrome
        if: steps.e2e-scope.outputs.run-e2e == 'true'
        run: |
          set -euo pipefail
          if command -v google-chrome >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            google-chrome --version
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            google-chrome-stable --version
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browsers
        if: steps.e2e-scope.outputs.run-e2e == 'true' && steps.system-chrome.outputs.available != 'true'
        timeout-minutes: 8
        working-directory: frontend
        env:
          PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
        run: npx playwright install --with-deps --only-shell chromium

      - name: Start backend
        if: steps.e2e-scope.outputs.run-e2e == 'true'
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://riskhub:riskhub_test@localhost:5432/riskhub_test
          SECRET_KEY: test-secret-key-for-ci-testing-only
          DEBUG: 'true'
          MOCK_AUTH_ENABLED: 'true'
          AUTH_MODE: hybrid_dev
          ENABLE_SCHEDULER: 'true'
          SCHEDULER_JOB_PROFILE: outbox_only
          CORS_ORIGINS: '["http://localhost:5173"]'
        run: |
          # Run migrations
          alembic upgrade head
          
          # Seed deterministic test data
          python -m app.db.seed
          python -m scripts.seed_e2e_all
          
          # Start server in background
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../e2e-backend.log 2>&1 &

          # Wait for server readiness on the canonical API readiness route.
          for attempt in $(seq 1 30); do
            if curl --retry 1 --retry-delay 0 --retry-connrefused -fsS http://localhost:8000/api/v1/readyz >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Backend did not become ready on /api/v1/readyz" >&2
              cat ../e2e-backend.log >&2 || true
              exit 1
            fi
            sleep 2
          done

          # Auth contract check required by E2E demo-login helper
          python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://localhost:8000/api/v1/auth/config", timeout=10) as response:
              payload = json.load(response)

          assert payload.get("demo_login_enabled") is True, payload
          assert payload.get("auth_mode") == "hybrid_dev", payload
          PY

      - name: Run E2E tests
        if: steps.e2e-scope.outputs.run-e2e == 'true'
        working-directory: frontend
        env:
          CI: 'true'
          PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
          PLAYWRIGHT_CHROMIUM_CHANNEL: chrome
        run: |
          if [ "${{ steps.system-chrome.outputs.available }}" = "true" ]; then
            npx playwright test -c playwright.config.ts --project=ci
          else
            npx playwright test -c playwright.config.ts --project=chromium
          fi

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && steps.e2e-scope.outputs.run-e2e == 'true'
        with:
          name: playwright-report
          path: tests/results/frontend/playwright/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure() && steps.e2e-scope.outputs.run-e2e == 'true'
        with:
          name: test-artifacts
          path: |
            tests/results/frontend/playwright/test-results/
            e2e-backend.log
          retention-days: 7

  production-profile-smoke:
    name: Production Profile Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15@sha256:c635fa3e3b7421a659d34abdfd6d492f679cbe8149e261a501237b55c5a94212
        env:
          POSTGRES_USER: riskhub
          POSTGRES_PASSWORD: riskhub_test
          POSTGRES_DB: riskhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7@sha256:a5995dfdf108997f8a7c9587f54fad5e94ed5848de5236a6b28119e99efd67e0
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend in production profile
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://riskhub:riskhub_test@localhost:5432/riskhub_test
          SECRET_KEY: test-secret-key-for-ci-testing-only-1234567890
          DEBUG: 'false'
          MOCK_AUTH_ENABLED: 'false'
          AUTH_MODE: microsoft_sso
          ENTRA_TENANT_ID: 00000000-0000-0000-0000-000000000000
          ENTRA_CLIENT_ID: 11111111-1111-1111-1111-111111111111
          ENTRA_CLIENT_SECRET: production-entra-client-secret
          DIRECTORY_PROVIDER: graph
          ENTRA_JIT_PROVISIONING_ENABLED: 'false'
          AUTH_SSO_ALLOW_EMAIL_LINK: 'false'
          CORS_ORIGINS: '["http://localhost"]'
          ALLOWED_HOSTS: '["localhost","127.0.0.1"]'
          REDIS_URL: redis://localhost:6379/0
          TRUSTED_PROXIES: '["127.0.0.1","::1"]'
        run: |
          alembic upgrade head
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../prod-smoke-backend.log 2>&1 &

          for attempt in $(seq 1 30); do
            if curl --retry 1 --retry-delay 0 --retry-connrefused -fsS http://localhost:8000/api/v1/readyz >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Production-profile backend did not become ready on /api/v1/readyz" >&2
              cat ../prod-smoke-backend.log >&2 || true
              exit 1
            fi
            sleep 2
          done

      - name: Verify production-profile health, auth config, docs, and headers
        run: |
          curl --retry 5 --retry-delay 2 --retry-connrefused -fsS http://localhost:8000/api/v1/readyz > /tmp/prod-readyz.json
          curl --retry 5 --retry-delay 2 --retry-connrefused -fsS http://localhost:8000/api/v1/health > /tmp/prod-health.json
          python - <<'PY'
          import json
          import urllib.error
          import urllib.request

          with urllib.request.urlopen("http://localhost:8000/api/v1/readyz", timeout=10) as response:
              ready_payload = json.load(response)
          assert set(ready_payload) == {"ready", "database", "redis", "scheduler_role", "scheduler_status"}, ready_payload
          assert ready_payload["ready"] is True, ready_payload
          assert ready_payload["database"] == "connected", ready_payload
          assert ready_payload["redis"] == "connected", ready_payload
          assert ready_payload["scheduler_role"] in {"disabled", "leader", "follower"}, ready_payload
          assert ready_payload["scheduler_status"] in {"disabled", "leader_running", "follower_ready"}, ready_payload

          with urllib.request.urlopen("http://localhost:8000/api/v1/health", timeout=10) as response:
              payload = json.load(response)
              headers = response.headers

          assert set(payload) == {"status", "ready", "database", "redis", "scheduler_role", "scheduler_status"}, payload
          assert payload["status"] == "healthy", payload
          assert payload["ready"] is True, payload
          assert payload["database"] == "connected", payload
          assert payload["redis"] == "connected", payload
          assert payload["scheduler_role"] in {"disabled", "leader", "follower"}, payload
          assert payload["scheduler_status"] in {"disabled", "leader_running", "follower_ready"}, payload
          assert headers["Strict-Transport-Security"] == "max-age=31536000; includeSubDomains; preload"
          csp = headers["Content-Security-Policy"]
          assert "style-src 'self' https://fonts.googleapis.com" in csp
          assert "'unsafe-inline'" not in csp

          with urllib.request.urlopen("http://localhost:8000/api/v1/auth/config", timeout=10) as response:
              auth_payload = json.load(response)

          assert auth_payload["auth_mode"] == "microsoft_sso", auth_payload
          assert auth_payload["demo_login_enabled"] is False, auth_payload
          assert auth_payload["sso"]["enabled"] is True, auth_payload

          for path in ("http://localhost:8000/docs", "http://localhost:8000/openapi.json"):
              try:
                  urllib.request.urlopen(path, timeout=10)
              except urllib.error.HTTPError as exc:
                  assert exc.code == 404, (path, exc.code)
              else:
                  raise AssertionError(f"{path} unexpectedly succeeded in production profile")
          PY

      - name: Upload production smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-profile-smoke
          path: |
            prod-smoke-backend.log
            /tmp/prod-readyz.json
            /tmp/prod-health.json
          retention-days: 14
