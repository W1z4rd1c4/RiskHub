# RiskHub E2E Testing Workflow
# Runs Playwright E2E tests on PRs and pushes

name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: riskhub
          POSTGRES_PASSWORD: riskhub_test
          POSTGRES_DB: riskhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://riskhub:riskhub_test@localhost:5432/riskhub_test
          SECRET_KEY: test-secret-key-for-ci-testing-only
          DEBUG: 'true'
          MOCK_AUTH_ENABLED: 'true'
          AUTH_MODE: hybrid_dev
        run: |
          # Run migrations
          alembic upgrade head
          
          # Seed deterministic test data
          python -m app.db.seed
          python -m scripts.seed_e2e_all
          
          # Start server in background
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          
          # Wait for server
          sleep 10
          curl -f http://localhost:8000/health || exit 1

          # Auth contract check required by E2E demo-login helper
          python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://localhost:8000/api/v1/auth/config", timeout=10) as response:
              payload = json.load(response)

          assert payload.get("demo_login_enabled") is True, payload
          assert payload.get("auth_mode") == "hybrid_dev", payload
          PY

      - name: Run E2E tests
        working-directory: frontend
        env:
          CI: 'true'
        run: npx playwright test -c ../tests/frontend/e2e/playwright.config.ts --project=chromium

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/results/frontend/playwright/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts
          path: |
            tests/results/frontend/playwright/test-results/
          retention-days: 7
