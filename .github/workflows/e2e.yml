# RiskHub E2E Testing Workflow
# Runs Playwright E2E tests on PRs and pushes

name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:15@sha256:c635fa3e3b7421a659d34abdfd6d492f679cbe8149e261a501237b55c5a94212
        env:
          POSTGRES_USER: riskhub
          POSTGRES_PASSWORD: riskhub_test
          POSTGRES_DB: riskhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://riskhub:riskhub_test@localhost:5432/riskhub_test
          SECRET_KEY: test-secret-key-for-ci-testing-only
          DEBUG: 'true'
          MOCK_AUTH_ENABLED: 'true'
          AUTH_MODE: hybrid_dev
          ENABLE_SCHEDULER: 'true'
          SCHEDULER_JOB_PROFILE: outbox_only
          CORS_ORIGINS: '["http://localhost:5173"]'
        run: |
          # Run migrations
          alembic upgrade head
          
          # Seed deterministic test data
          python -m app.db.seed
          python -m scripts.seed_e2e_all
          
          # Start server in background
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../e2e-backend.log 2>&1 &

          # Wait for server readiness on the canonical API health route.
          for attempt in $(seq 1 30); do
            if curl --retry 1 --retry-delay 0 --retry-connrefused -fsS http://localhost:8000/api/v1/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Backend did not become ready on /api/v1/health" >&2
              cat ../e2e-backend.log >&2 || true
              exit 1
            fi
            sleep 2
          done

          # Auth contract check required by E2E demo-login helper
          python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://localhost:8000/api/v1/auth/config", timeout=10) as response:
              payload = json.load(response)

          assert payload.get("demo_login_enabled") is True, payload
          assert payload.get("auth_mode") == "hybrid_dev", payload
          PY

      - name: Run E2E tests
        working-directory: frontend
        env:
          CI: 'true'
        run: npx playwright test -c playwright.config.ts --project=chromium

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: tests/results/frontend/playwright/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: test-artifacts
          path: |
            tests/results/frontend/playwright/test-results/
            e2e-backend.log
          retention-days: 7

  production-profile-smoke:
    name: Production Profile Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15@sha256:c635fa3e3b7421a659d34abdfd6d492f679cbe8149e261a501237b55c5a94212
        env:
          POSTGRES_USER: riskhub
          POSTGRES_PASSWORD: riskhub_test
          POSTGRES_DB: riskhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7@sha256:a5995dfdf108997f8a7c9587f54fad5e94ed5848de5236a6b28119e99efd67e0
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend in production profile
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://riskhub:riskhub_test@localhost:5432/riskhub_test
          SECRET_KEY: test-secret-key-for-ci-testing-only-1234567890
          DEBUG: 'false'
          MOCK_AUTH_ENABLED: 'false'
          AUTH_MODE: microsoft_sso
          ENTRA_TENANT_ID: 00000000-0000-0000-0000-000000000000
          ENTRA_CLIENT_ID: 11111111-1111-1111-1111-111111111111
          ENTRA_CLIENT_SECRET: production-entra-client-secret
          DIRECTORY_PROVIDER: graph
          ENTRA_JIT_PROVISIONING_ENABLED: 'false'
          AUTH_SSO_ALLOW_EMAIL_LINK: 'false'
          CORS_ORIGINS: '["http://localhost"]'
          ALLOWED_HOSTS: '["localhost","127.0.0.1"]'
          REDIS_URL: redis://localhost:6379/0
          TRUSTED_PROXIES: '["127.0.0.1","::1"]'
        run: |
          alembic upgrade head
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../prod-smoke-backend.log 2>&1 &

          for attempt in $(seq 1 30); do
            if curl --retry 1 --retry-delay 0 --retry-connrefused -fsS http://localhost:8000/api/v1/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Production-profile backend did not become ready on /api/v1/health" >&2
              cat ../prod-smoke-backend.log >&2 || true
              exit 1
            fi
            sleep 2
          done

      - name: Verify production-profile health, auth config, docs, and headers
        run: |
          curl --retry 5 --retry-delay 2 --retry-connrefused -fsS http://localhost:8000/api/v1/health > /tmp/prod-health.json
          python - <<'PY'
          import json
          import urllib.error
          import urllib.request

          with urllib.request.urlopen("http://localhost:8000/api/v1/health", timeout=10) as response:
              payload = json.load(response)
              headers = response.headers

          assert payload == {"status": "healthy"}, payload
          assert headers["Strict-Transport-Security"] == "max-age=31536000; includeSubDomains; preload"
          csp = headers["Content-Security-Policy"]
          assert "style-src 'self' https://fonts.googleapis.com" in csp
          assert "'unsafe-inline'" not in csp

          with urllib.request.urlopen("http://localhost:8000/api/v1/auth/config", timeout=10) as response:
              auth_payload = json.load(response)

          assert auth_payload["auth_mode"] == "microsoft_sso", auth_payload
          assert auth_payload["demo_login_enabled"] is False, auth_payload
          assert auth_payload["sso"]["enabled"] is True, auth_payload

          for path in ("http://localhost:8000/docs", "http://localhost:8000/openapi.json"):
              try:
                  urllib.request.urlopen(path, timeout=10)
              except urllib.error.HTTPError as exc:
                  assert exc.code == 404, (path, exc.code)
              else:
                  raise AssertionError(f"{path} unexpectedly succeeded in production profile")
          PY

      - name: Upload production smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: production-profile-smoke
          path: |
            prod-smoke-backend.log
            /tmp/prod-health.json
          retention-days: 14
