name: Release Parity Fast Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

jobs:
  parity-fast:
    name: Fast Parity Audit (Non-Blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies (venv fingerprint parity)
        run: |
          set -euo pipefail
          python -m venv backend/venv
          backend/venv/bin/pip install --upgrade pip
          backend/venv/bin/pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run fast parity audit
        env:
          RUN_ID: fast-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          python3 scripts/security/run_release_parity_audit.py --run-id "${RUN_ID}" --skip-prod-readiness

      - name: Upload parity artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: release-parity-fast-${{ github.run_id }}-${{ github.run_attempt }}
          path: tests/results/release-parity-audit-fast-${{ github.run_id }}-${{ github.run_attempt }}/
          retention-days: 14
