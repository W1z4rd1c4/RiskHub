name: Maintenance Governance

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'AGENTS.md'
      - '.planning/**'
      - 'docs/**'
      - 'scripts/check_docs_contract.py'
      - 'scripts/quality/**'
      - 'scripts/tools/**'
      - 'frontend/scripts/**'
      - 'backend/mypy.ini'
      - 'backend/ruff.toml'
      - '.github/workflows/**'
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-governance:
    name: Docs Governance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Docs topology consistency gate
        run: |
          set -euo pipefail
          make -f scripts/Makefile docs-topology-consistency | tee governance-docs-topology.log

      - name: Production contract docs gate
        run: |
          set -euo pipefail
          python3 scripts/security/validate_production_contract_docs.py | tee governance-production-contract.log

      - name: Deprecated import contract
        run: |
          set -euo pipefail
          python3 scripts/security/validate_deprecated_imports.py | tee governance-deprecated-imports.log

      - name: Docs tree audit (informational)
        run: python3 scripts/tools/docs_tree_audit.py --scope canonical

      - name: Validate ratchet status documentation contract
        run: python3 scripts/tools/validate_lint_ratchet_docs.py

      - name: Upload docs governance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maintenance-docs-governance
          path: |
            governance-docs-topology.log
            governance-production-contract.log
            governance-deprecated-imports.log
            tests/results/docs/docs-tree-audit-*
          retention-days: 30

  frontend-maintenance:
    name: Frontend Maintenance Contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Frontend debt budget
        run: |
          set -euo pipefail
          npm run quality:debt -- --report-json | tee ../maintenance-frontend-debt.log
          node scripts/quality/validate-debt-budget-report.mjs
        working-directory: frontend

      - name: Frontend cleanup audit contract
        run: |
          set -euo pipefail
          npm run cleanup:deadcode | tee ../maintenance-frontend-cleanup.log
          node scripts/cleanup/validate-unreachable-report.mjs
          node scripts/quality/validate-no-inline-styles.mjs
          if git ls-files | grep -q '^tests/results/frontend/playwright/playwright-report/'; then
            echo "Tracked Playwright report artifacts are not allowed."
            exit 1
          fi
        working-directory: frontend

      - name: Upload frontend maintenance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maintenance-frontend-contracts
          path: |
            maintenance-frontend-debt.log
            maintenance-frontend-cleanup.log
            tests/results/quality/frontend/debt-budget/debt.json
            tests/results/quality/frontend/cleanup-audit/unreachable.md
            tests/results/quality/frontend/cleanup-audit/unreachable.json
          retention-days: 30

  backend-maintenance-informational:
    name: Backend Maintenance (Informational)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt
            backend/requirements-dev.txt

      - name: Install backend lint dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
        working-directory: backend

      - name: Backend suppression budget
        run: python3 scripts/tools/suppression_budget.py | tee maintenance-backend-suppression-budget.log

      - name: Run full backend Ruff report (informational)
        run: ruff check --config backend/ruff.toml backend --output-format=github

      - name: Run informational full-tree mypy
        run: |
          set -euo pipefail
          cd backend
          mypy --config-file mypy.ini app | tee ../maintenance-backend-mypy.log

      - name: Upload backend maintenance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maintenance-backend-quality
          path: |
            maintenance-backend-suppression-budget.log
            maintenance-backend-mypy.log
            tests/results/quality/suppression-budget-*/suppression-budget.json
          retention-days: 30
