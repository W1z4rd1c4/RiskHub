# RiskHub Security Scanning Workflow
# Runs security scans on every PR and push to main

name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  # Python Security Scans
  python-security:
    name: Python Security (Bandit + pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run Bandit (SAST, high severity gate)
        run: |
          set -euo pipefail
          bandit --ini .bandit -r app -f json -o bandit-report.json --exit-zero
          bandit --ini .bandit -r app -f txt --severity-level high
          python - <<'PY'
          import json
          import sys

          with open("bandit-report.json", "r", encoding="utf-8") as fh:
              report = json.load(fh)
          high = [item for item in report.get("results", []) if item.get("issue_severity") == "HIGH"]
          if high:
              print(f"Bandit high-severity findings: {len(high)}")
              for finding in high[:20]:
                  print(
                      f"- {finding.get('filename')}:{finding.get('line_number')} "
                      f"{finding.get('test_id')} {finding.get('issue_text')}"
                  )
              sys.exit(1)
          print("Bandit high-severity findings: 0")
          PY

      - name: Run pip-audit (Dependency Scan with allowlist)
        run: |
          set -euo pipefail
          ALLOWLIST_FILE="security/pip-audit-allowlist.txt"
          if [ ! -f "${ALLOWLIST_FILE}" ]; then
            echo "Missing allowlist file: ${ALLOWLIST_FILE}" >&2
            exit 1
          fi

          IGNORE_ARGS=()
          while IFS= read -r raw_line || [ -n "${raw_line}" ]; do
            vuln_id="${raw_line%%#*}"
            vuln_id="$(echo "${vuln_id}" | tr -d '[:space:]')"
            if [ -n "${vuln_id}" ]; then
              IGNORE_ARGS+=(--ignore-vuln "${vuln_id}")
            fi
          done < "${ALLOWLIST_FILE}"

          pip-audit -r requirements.txt --format json --output pip-audit-report.json "${IGNORE_ARGS[@]}"
          pip-audit -r requirements.txt "${IGNORE_ARGS[@]}"

      - name: Upload Bandit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json
          retention-days: 30

      - name: Upload pip-audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.json
          retention-days: 30

  # Frontend Security Scans
  frontend-security:
    name: Frontend Security (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          set -euo pipefail
          npm audit --json > npm-audit-report.json || true
          npm audit --audit-level=high

      - name: Upload npm audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.json
          retention-days: 30

  # Frontend i18n Quality Gates
  frontend-i18n:
    name: Frontend i18n (Parity + Hardcoded Scan)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run i18n test gate
        run: npm run i18n:test

  # Container Security Scan
  container-security:
    name: Container Scan (Trivy + SBOM Correlation)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t riskhub-backend:scan -f backend/Dockerfile backend/

      - name: Build Frontend Image
        run: docker build -t riskhub-frontend:scan -f frontend/Dockerfile frontend/

      - name: Run Trivy on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'riskhub-backend:scan'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'riskhub-frontend:scan'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Generate Backend SBOM (Syft)
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/repo" \
            anchore/syft:latest riskhub-backend:scan -o json > sbom-backend.json

      - name: Run Grype on Backend SBOM
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            anchore/grype:latest \
            sbom:/repo/sbom-backend.json \
            --config /repo/backend/security/grype-ignore.yaml \
            -o json > grype-backend.json

      - name: Fail on unresolved Grype HIGH/CRITICAL
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import sys

          with open("grype-backend.json", "r", encoding="utf-8") as fh:
              report = json.load(fh)

          findings = [
              match
              for match in report.get("matches", [])
              if match.get("vulnerability", {}).get("severity", "").upper() in {"HIGH", "CRITICAL"}
          ]

          print(f"Grype HIGH/CRITICAL findings: {len(findings)}")
          for finding in findings[:20]:
              vuln = finding.get("vulnerability", {})
              artifact = finding.get("artifact", {})
              print(
                  f"- {vuln.get('id')} severity={vuln.get('severity')} "
                  f"package={artifact.get('name')} version={artifact.get('version')}"
              )

          if findings:
              sys.exit(1)
          PY

      - name: Upload Trivy Backend Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'
        continue-on-error: true

      - name: Upload Trivy Frontend Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'
        continue-on-error: true

      - name: Upload SBOM Correlation Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-grype-backend-report
          path: |
            sbom-backend.json
            grype-backend.json
          retention-days: 30

  # Secrets Detection
  secrets-detection:
    name: Secrets Detection (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gitleaks config (parse gate)
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            --entrypoint /bin/sh \
            zricethezav/gitleaks:v8.18.2 \
            sh -lc 'mkdir -p /tmp/gitleaks-empty && gitleaks detect --source /tmp/gitleaks-empty --no-git --config .gitleaks.toml --report-format json --report-path /tmp/gitleaks-parse.json --exit-code 0'

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # Security Headers Check
  security-headers:
    name: Security Headers Verification
    runs-on: ubuntu-latest
    needs: [python-security, frontend-security]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Security Headers Tests
        run: pytest ../tests/backend/pytest/test_security_headers.py -q
