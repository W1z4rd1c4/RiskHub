name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend Vitest coverage gate
        run: npm run test:coverage
        working-directory: frontend

  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt
            backend/requirements-dev.txt

      - name: Install backend lint dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
        working-directory: backend

      - name: Backend Ruff gate
        run: |
          set -euo pipefail
          cd backend
          ruff check --config ruff.toml app ../tests/backend/pytest scripts | tee ../lint-backend-ruff.log

      - name: Backend mypy gate
        run: |
          set -euo pipefail
          cd backend
          mypy --config-file mypy.ini app | tee ../lint-backend-mypy.log

      - name: Backend suppression budget gate
        run: |
          set -euo pipefail
          python3 scripts/tools/suppression_budget.py | tee lint-backend-suppression-budget.log

      - name: Upload backend lint evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-backend-evidence
          path: |
            lint-backend-ruff.log
            lint-backend-mypy.log
            lint-backend-suppression-budget.log
            tests/results/quality/suppression-budget-*/suppression-budget.json
          retention-days: 30

  lint:
    name: Frontend + Repo Contracts
    runs-on: ubuntu-latest
    needs: [frontend-unit-tests]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Frontend lint
        run: |
          set -euo pipefail
          npm run lint | tee ../lint-frontend.log
        working-directory: frontend

      - name: Frontend typecheck
        run: |
          set -euo pipefail
          npx tsc --noEmit | tee ../lint-frontend-typecheck.log
        working-directory: frontend

      - name: Frontend build
        run: |
          set -euo pipefail
          npm run build | tee ../lint-frontend-build.log
        working-directory: frontend

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt
            backend/requirements-dev.txt

      - name: Install repo contract Python dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Repo artifact + script syntax contracts
        run: |
          set -euo pipefail
          AUTHZ_CONTRACT_BASE_REF=HEAD
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            AUTHZ_CONTRACT_BASE_REF="origin/${{ github.base_ref }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            AUTHZ_CONTRACT_BASE_REF="${{ github.event.before }}"
          fi
          AUTHZ_CONTRACT_BASE_REF="$AUTHZ_CONTRACT_BASE_REF" make -f scripts/Makefile quality-repo-contracts | tee lint-repo-contracts.log

      - name: Production contract docs gate
        run: |
          set -euo pipefail
          python3 scripts/security/validate_production_contract_docs.py | tee lint-production-contract.log

      - name: Deprecated import contract
        run: |
          set -euo pipefail
          python3 scripts/security/validate_deprecated_imports.py | tee lint-deprecated-imports.log

      - name: Write lint summary
        run: |
          {
            echo "# Lint Summary";
            echo "";
            echo "- Frontend unit tests: PASS";
            echo "- Frontend lint: PASS";
            echo "- Frontend typecheck: PASS";
            echo "- Frontend build: PASS";
            echo "- Repo artifact + script syntax contracts: PASS";
            echo "- Production contract docs: PASS";
            echo "- Deprecated imports: PASS";
          } > lint-summary.md

      - name: Upload lint evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-evidence
          path: |
            lint-summary.md
            lint-frontend.log
            lint-frontend-typecheck.log
            lint-frontend-build.log
            lint-repo-contracts.log
            lint-production-contract.log
            lint-deprecated-imports.log
          retention-days: 30
