name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Frontend + Backend)
    runs-on: ubuntu-latest
    needs: [docs-topology-consistency]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Frontend lint
        run: |
          set -euo pipefail
          npm run lint | tee ../lint-frontend.log
        working-directory: frontend

      - name: Frontend typecheck
        run: |
          set -euo pipefail
          npx tsc --noEmit | tee ../lint-frontend-typecheck.log
        working-directory: frontend

      - name: Frontend debt budget
        run: |
          set -euo pipefail
          npm run quality:debt -- --report-json | tee ../lint-frontend-debt.log
          node scripts/quality/validate-debt-budget-report.mjs
        working-directory: frontend

      - name: Frontend cleanup audit contract
        run: |
          set -euo pipefail
          npm run cleanup:deadcode | tee ../lint-frontend-cleanup.log
          node scripts/cleanup/validate-unreachable-report.mjs
          node scripts/quality/validate-no-inline-styles.mjs
          if git ls-files | grep -q '^tests/results/frontend/playwright/playwright-report/'; then
            echo "Tracked Playwright report artifacts are not allowed."
            exit 1
          fi
        working-directory: frontend

      - name: Frontend build
        run: |
          set -euo pipefail
          npm run build | tee ../lint-frontend-build.log
        working-directory: frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt

      - name: Install backend lint dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
        working-directory: backend

      - name: Backend lint (Ruff hard gate)
        run: |
          set -euo pipefail
          ruff check app ../tests/backend/pytest scripts | tee ../lint-backend-ruff.log
        working-directory: backend

      - name: Backend suppression budget (blocking)
        run: |
          set -euo pipefail
          python3 scripts/tools/suppression_budget.py | tee lint-backend-suppression-budget.log

      - name: Validate ratchet status documentation contract
        run: |
          set -euo pipefail
          test -f docs/quality/lint-ratchet-status.md
          grep -q "^## Required Sections" docs/quality/lint-ratchet-status.md
          grep -q "^## Ratchet Classes" docs/quality/lint-ratchet-status.md
          grep -q "^## Notes" docs/quality/lint-ratchet-status.md
          test -f docs/quality/baseline/e712-app.txt
          test -f docs/quality/baseline/e402-app.txt
          test -f docs/quality/baseline/e501-app.txt

      - name: Compute Ruff ratchet class counts
        run: |
          set -euo pipefail
          E712_COUNT="$(ruff check app --select E712 --output-format json | python -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          E402_COUNT="$(ruff check app --select E402 --output-format json | python -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          E501_COUNT="$(ruff check app --select E501 --output-format json | python -c 'import json,sys; print(len(json.load(sys.stdin)))')"
          echo "E712_COUNT=${E712_COUNT}" >> "$GITHUB_ENV"
          echo "E402_COUNT=${E402_COUNT}" >> "$GITHUB_ENV"
          echo "E501_COUNT=${E501_COUNT}" >> "$GITHUB_ENV"
          echo "Ruff ratchet counts: E712=${E712_COUNT}, E402=${E402_COUNT}, E501=${E501_COUNT}"
        working-directory: backend

      - name: Write lint baseline summary
        run: |
          {
            echo "# Lint Summary";
            echo "";
            echo "- Frontend lint: PASS";
            echo "- Frontend typecheck: PASS";
            echo "- Frontend debt budget: PASS";
            echo "- Frontend cleanup audit contract: PASS";
            echo "- Frontend build: PASS";
            echo "- Backend Ruff hard gate (backend/app + tests/backend/pytest + backend/scripts): PASS";
            echo "- Ruff ratchet status: E712=${E712_COUNT}, E402=${E402_COUNT}, E501=${E501_COUNT}";
          } > lint-summary.md

      - name: Upload lint evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-evidence
          path: |
            lint-summary.md
            lint-frontend.log
            lint-frontend-typecheck.log
            lint-frontend-debt.log
            lint-frontend-cleanup.log
            lint-frontend-build.log
            lint-backend-ruff.log
            lint-backend-suppression-budget.log
            tests/results/quality/frontend/debt-budget/debt.json
            tests/results/quality/frontend/cleanup-audit/unreachable.md
            tests/results/quality/frontend/cleanup-audit/unreachable.json
            tests/results/quality/suppression-budget-*/suppression-budget.json
          retention-days: 30

  docs-topology-consistency:
    name: Docs Topology Consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Docs topology consistency gate
        run: |
          set -euo pipefail
          make -f scripts/Makefile docs-topology-consistency | tee lint-docs-topology.log

      - name: Upload docs topology evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-topology-evidence
          path: lint-docs-topology.log
          retention-days: 30

  ruff-informational:
    name: Ruff Informational (Full backend tree)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt

      - name: Install backend lint dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
        working-directory: backend

      - name: Run full backend Ruff report (informational)
        run: ruff check --config backend/ruff.toml backend --output-format=github

  docs-tree-audit:
    name: Docs Tree Audit (Informational)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run canonical docs-tree topology audit (informational)
        run: python3 scripts/tools/docs_tree_audit.py --scope canonical

      - name: Upload docs-tree audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-tree-audit
          path: tests/results/docs/docs-tree-audit-*
          retention-days: 30
