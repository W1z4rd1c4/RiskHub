name: Backend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  sqlite-tests:
    name: Backend SQLite Regression
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run SQLite regression suite
        working-directory: backend
        run: pytest -m "not postgres and not benchmark" -q

  postgres-tests:
    name: Backend Postgres Regression
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15@sha256:c635fa3e3b7421a659d34abdfd6d492f679cbe8149e261a501237b55c5a94212
        env:
          POSTGRES_USER: riskhub
          POSTGRES_PASSWORD: riskhub_test
          POSTGRES_DB: riskhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run blocking Postgres regression contract
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://riskhub:riskhub_test@localhost:5432/riskhub_test
        run: make -f scripts/Makefile test-postgres-ci
