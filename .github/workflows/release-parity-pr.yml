name: Release Parity Contract

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parity-contract:
    name: Release Parity Contract
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Docs/runtime contract consistency
        run: python3 scripts/check_docs_contract.py

      - name: Production contract docs parity
        run: python3 scripts/security/validate_production_contract_docs.py

      - name: Workflow pinning contract
        run: python3 scripts/security/validate_workflow_pins.py

      - name: Repository hardening contract
        run: python3 scripts/security/validate_repo_hardening.py

      - name: Deprecated import contract
        run: python3 scripts/security/validate_deprecated_imports.py
