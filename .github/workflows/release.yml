name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "push" ]]; then
            version="${TAG_NAME}"
          else
            version="${INPUT_VERSION}"
          fi
          if [[ -z "${version}" ]]; then
            echo "Release version is empty" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  release-parity-gate:
    name: Release Parity Gate
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies (venv fingerprint parity)
        run: |
          set -euo pipefail
          python -m venv backend/venv
          backend/venv/bin/pip install --upgrade pip
          backend/venv/bin/pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run full release parity audit
        env:
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          python3 scripts/security/run_release_parity_audit.py --run-id "${RUN_ID}"

      - name: Enforce GO decision
        env:
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import pathlib
          import os

          run_id = os.environ["RUN_ID"]
          decision_path = pathlib.Path(f"tests/results/release-parity-audit-{run_id}/decision.json")
          payload = json.loads(decision_path.read_text(encoding="utf-8"))
          decision = payload.get("decision")
          if decision != "GO":
              raise SystemExit(f"Release blocked: parity decision is {decision}")
          print(f"Release parity decision: {decision}")
          PY

      - name: Upload parity artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-parity-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: tests/results/release-parity-audit-${{ github.run_id }}-${{ github.run_attempt }}/
          retention-days: 14

  docker-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: [prepare, release-parity-gate]
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          set -euo pipefail
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          backend_image="ghcr.io/${owner_lc}/riskhub-backend:${RELEASE_VERSION}"
          docker build --target runtime -t "${backend_image}" -f backend/Dockerfile backend
          docker push "${backend_image}"

      - name: Build and push backend DB image
        run: |
          set -euo pipefail
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          backend_db_image="ghcr.io/${owner_lc}/riskhub-backend-db:${RELEASE_VERSION}"
          docker build --target dbtasks -t "${backend_db_image}" -f backend/Dockerfile backend
          docker push "${backend_db_image}"

      - name: Build and push frontend image
        run: |
          set -euo pipefail
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          frontend_image="ghcr.io/${owner_lc}/riskhub-frontend:${RELEASE_VERSION}"
          docker build -t "${frontend_image}" -f frontend/Dockerfile frontend
          docker push "${frontend_image}"

      - name: Build and push redis image
        run: |
          set -euo pipefail
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          redis_image="ghcr.io/${owner_lc}/riskhub-redis:${RELEASE_VERSION}"
          docker build -t "${redis_image}" -f docker/redis/Dockerfile docker/redis
          docker push "${redis_image}"

  linux-bundle:
    name: Build Linux Bundle
    runs-on: ubuntu-latest
    needs: prepare
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-runtime.txt
            backend/requirements-db.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build linux release bundle
        run: |
          set -euo pipefail
          bash scripts/release/build_linux_bundle.sh --version "${RELEASE_VERSION}" --output-dir dist/releases

      - name: Upload linux bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-bundle
          path: dist/releases/riskhub-linux-${{ env.RELEASE_VERSION }}.tar.gz
          retention-days: 14

  verify-linux-bundle:
    name: Verify Linux Bundle
    runs-on: ubuntu-latest
    needs: [prepare, linux-bundle]
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download linux bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release-bundle
          path: dist/releases

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install nginx for config validation
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y nginx

      - name: Verify bundle contents and offline installability
        run: |
          set -euo pipefail
          bundle="dist/releases/riskhub-linux-${RELEASE_VERSION}.tar.gz"
          test -f "${bundle}"
          tmp_root="$(mktemp -d)"
          trap 'rm -rf "${tmp_root}"' EXIT
          tar -xzf "${bundle}" -C "${tmp_root}"
          release_dir="${tmp_root}/riskhub-linux-${RELEASE_VERSION}"

          test -f "${release_dir}/manifest.json"
          test -d "${release_dir}/backend/app"
          test -d "${release_dir}/backend/alembic"
          test -f "${release_dir}/backend/requirements-runtime.txt"
          test -d "${release_dir}/backend/wheels"
          test -d "${release_dir}/backend_db/scripts"
          test -f "${release_dir}/backend_db/requirements-db.txt"
          test -d "${release_dir}/frontend/dist"
          test -f "${release_dir}/deploy/lib/render.py"
          test -f "${release_dir}/deploy/templates/linux/nginx-site.conf.tmpl"
          test -f "${release_dir}/deploy/templates/linux/riskhub-backend.service.tmpl"
          test -f "${release_dir}/deploy/templates/linux/riskhub-scheduler.service.tmpl"
          test -f "${release_dir}/deploy/templates/linux/riskhub-redis.service.tmpl"

          python3.13 - <<'PY' "${release_dir}"
          from pathlib import Path
          import sys

          release_dir = Path(sys.argv[1])
          scripts_dir = release_dir / "backend_db" / "scripts"
          expected = {"__init__.py", "bootstrap_sso_user.py", "seed_departments.py", "seed_roles_permissions.py"}
          actual = {path.name for path in scripts_dir.iterdir()}
          assert actual == expected, actual
          assert not (release_dir / "backend" / "scripts").exists()

          hidden = sorted(str(path.relative_to(release_dir)) for path in release_dir.rglob(".*"))
          assert not hidden, hidden
          PY

          python3.13 -m venv "${release_dir}/venv"
          "${release_dir}/venv/bin/pip" install --no-index --find-links "${release_dir}/backend/wheels" -r "${release_dir}/backend/requirements-runtime.txt"
          python3.13 -m venv "${release_dir}/db-venv"
          "${release_dir}/db-venv/bin/pip" install --no-index --find-links "${release_dir}/backend/wheels" -r "${release_dir}/backend_db/requirements-db.txt"
          (
            cd "${release_dir}/backend"
            "${release_dir}/venv/bin/python" -c "from pathlib import Path; from alembic.config import Config; assert Path('alembic').is_dir(); Config('alembic.ini')"
          )
          (
            cd "${release_dir}/backend_db"
            PYTHONPATH="${release_dir}/backend:${release_dir}/backend_db" \
              "${release_dir}/db-venv/bin/python" -c "import scripts.seed_roles_permissions, scripts.seed_departments, scripts.bootstrap_sso_user"
          )

      - name: Verify rendered nginx and systemd artifacts
        run: |
          set -euo pipefail
          tmp_root="$(mktemp -d)"
          trap 'rm -rf "${tmp_root}"' EXIT
          tar -xzf "dist/releases/riskhub-linux-${RELEASE_VERSION}.tar.gz" -C "${tmp_root}"
          release_dir="${tmp_root}/riskhub-linux-${RELEASE_VERSION}"
          config_path="${tmp_root}/riskhub.env"
          secret_dir="${tmp_root}/secrets"
          mkdir -p "${secret_dir}"
          cat > "${config_path}" <<'EOF'
          PUBLIC_URL=https://riskhub.example.com
          ENTRA_TENANT_ID=00000000-0000-0000-0000-000000000000
          ENTRA_CLIENT_ID=11111111-1111-1111-1111-111111111111
          BOOTSTRAP_ADMIN_EMAIL=admin@example.com
          BOOTSTRAP_CRO_EMAIL=cro@example.com
          API_WORKERS=4
          FRONTEND_BIND_PORT=8080
          EOF
          printf '%s\n' 'postgresql+asyncpg://riskhub:secret@postgres.example.com:5432/riskhub' > "${secret_dir}/database_url"
          printf '%s\n' '0123456789abcdef0123456789abcdef' > "${secret_dir}/secret_key"
          printf '%s\n' 'redis-secret' > "${secret_dir}/redis_password"
          printf '%s\n' 'entra-client-secret' > "${secret_dir}/entra_client_secret"
          chmod 750 "${secret_dir}"
          chmod 440 "${secret_dir}"/*

          python3 "${release_dir}/deploy/lib/render.py" render-linux-nginx-full --config "${config_path}" --release-root /opt/riskhub/current > "${tmp_root}/nginx.conf"
          python3 "${release_dir}/deploy/lib/render.py" render-linux-backend-unit --config "${config_path}" --current-link /opt/riskhub/current --runtime-dir /etc/riskhub/runtime --redis-service riskhub-redis > "${tmp_root}/riskhub-backend.service"
          python3 "${release_dir}/deploy/lib/render.py" render-linux-scheduler-unit --current-link /opt/riskhub/current --runtime-dir /etc/riskhub/runtime --redis-service riskhub-redis > "${tmp_root}/riskhub-scheduler.service"
          python3 "${release_dir}/deploy/lib/render.py" render-linux-redis-unit --secret-dir "${secret_dir}" > "${tmp_root}/riskhub-redis.service"
          python3 "${release_dir}/deploy/lib/render.py" write-runtime --config "${config_path}" --target linux --secret-dir "${secret_dir}" --runtime-dir /etc/riskhub/runtime --out-dir "${tmp_root}/runtime"

          nginx -t -c "${tmp_root}/nginx.conf" -p "${tmp_root}"
          systemd-analyze verify "${tmp_root}/riskhub-backend.service" "${tmp_root}/riskhub-scheduler.service" "${tmp_root}/riskhub-redis.service"

      - name: Verify linux deploy dry-run contract
        run: |
          set -euo pipefail
          tmp_root="$(mktemp -d)"
          trap 'rm -rf "${tmp_root}"' EXIT
          config_path="${tmp_root}/riskhub.env"
          secret_dir="${tmp_root}/secrets"
          mkdir -p "${secret_dir}"
          cat > "${config_path}" <<'EOF'
          PUBLIC_URL=https://riskhub.example.com
          ENTRA_TENANT_ID=00000000-0000-0000-0000-000000000000
          ENTRA_CLIENT_ID=11111111-1111-1111-1111-111111111111
          BOOTSTRAP_ADMIN_EMAIL=admin@example.com
          BOOTSTRAP_CRO_EMAIL=cro@example.com
          API_WORKERS=4
          FRONTEND_BIND_PORT=8080
          EOF
          printf '%s\n' 'postgresql+asyncpg://riskhub:secret@postgres.example.com:5432/riskhub' > "${secret_dir}/database_url"
          printf '%s\n' '0123456789abcdef0123456789abcdef' > "${secret_dir}/secret_key"
          printf '%s\n' 'redis-secret' > "${secret_dir}/redis_password"
          printf '%s\n' 'entra-client-secret' > "${secret_dir}/entra_client_secret"
          chmod 750 "${secret_dir}"
          chmod 440 "${secret_dir}"/*

          bash scripts/deploy.sh deploy \
            --target linux \
            --config "${config_path}" \
            --secret-dir "${secret_dir}" \
            --bundle "dist/releases/riskhub-linux-${RELEASE_VERSION}.tar.gz" \
            --dry-run \
            --yes

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, docker-images, linux-bundle, verify-linux-bundle]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download linux bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release-bundle
          path: dist/releases

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/riskhub-linux-${{ needs.prepare.outputs.version }}.tar.gz
