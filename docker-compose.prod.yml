# RiskHub Production Docker Compose Override
# Run with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ==========================================================================
  # Redis - Production (required for rate limiting + account lockout)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: riskhub-redis
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}" ]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==========================================================================
  # Database - Production overrides
  # ==========================================================================
  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-riskhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-riskhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups # For database backups
    restart: unless-stopped

  # ==========================================================================
  # Backend - Production overrides
  # ==========================================================================
  backend:
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - DEBUG=false
      - MOCK_AUTH_ENABLED=false
      - AUTH_MODE=${AUTH_MODE:-microsoft_sso}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:?ENTRA_TENANT_ID is required}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:?ENTRA_CLIENT_ID is required}
      - ENTRA_JIT_PROVISIONING_ENABLED=${ENTRA_JIT_PROVISIONING_ENABLED:-true}
      - ENTRA_ALLOWED_EMAIL_DOMAINS=${ENTRA_ALLOWED_EMAIL_DOMAINS:-[]}
      - ENTRA_CLOCK_SKEW_SECONDS=${ENTRA_CLOCK_SKEW_SECONDS:-60}
      - ENTRA_OIDC_DISCOVERY_URL=${ENTRA_OIDC_DISCOVERY_URL:-}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - CORS_ORIGINS=${CORS_ORIGINS:-["https://riskhub.example.com"]}
      - AD_EMULATOR_URL=${AD_EMULATOR_URL:-}
      # AD emulator webhook integration (signature verified via WEBHOOK_SECRET)
      - DIRECTORY_WEBHOOK_ENABLED=${DIRECTORY_WEBHOOK_ENABLED:-true}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:?WEBHOOK_SECRET is required}
      # ENABLE_SCHEDULER: Set to 'true' on exactly ONE backend instance to avoid duplicate jobs
      - ENABLE_SCHEDULER=${ENABLE_SCHEDULER:-false}
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================================================
  # Frontend - Production overrides
  # ==========================================================================
  frontend:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  postgres_data:
  backend_logs:
  redis_data:


networks:
  riskhub-network:
    driver: bridge
