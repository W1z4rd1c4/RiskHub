services:
  db:
    image: postgres:16
    container_name: riskhub-db
    environment:
      POSTGRES_USER: riskhub
      POSTGRES_PASSWORD: riskhub_dev
      POSTGRES_DB: riskhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
