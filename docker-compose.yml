# RiskHub Development Docker Compose
# ==============================================================================
#
# CANONICAL ENTRYPOINTS:
#
#   ./scripts/compose.sh up
#   ./scripts/compose.sh up --profile db-only
#   ./scripts/compose.sh up --lan 192.168.x.x
#   ./scripts/compose.sh reset --dataset test
#
# ==============================================================================

x-backend-environment: &backend-environment
  DATABASE_URL: postgresql+asyncpg://riskhub:riskhub_dev@db:5432/riskhub
  DEBUG: "true"
  MOCK_AUTH_ENABLED: "true"
  AUTH_MODE: hybrid_dev
  SECRET_KEY: dev-secret-key-not-for-production-use
  REDIS_URL: redis://redis:6379/0
  ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
  ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
  ENTRA_JIT_PROVISIONING_ENABLED: ${ENTRA_JIT_PROVISIONING_ENABLED:-true}
  ENTRA_ALLOWED_EMAIL_DOMAINS: ${ENTRA_ALLOWED_EMAIL_DOMAINS:-[]}
  ENTRA_CLOCK_SKEW_SECONDS: ${ENTRA_CLOCK_SKEW_SECONDS:-60}
  ENTRA_OIDC_DISCOVERY_URL: ${ENTRA_OIDC_DISCOVERY_URL:-}
  CORS_ORIGINS: "[\"http://localhost:80\",\"http://localhost:5173\",\"http://frontend:80\",\"http://${LAN_HOST:-localhost}:80\",\"http://${LAN_HOST:-localhost}:8000\"]"

services:
  db:
    profiles: ["db-only", "full"]
    image: postgres:16
    container_name: riskhub-db
    environment:
      POSTGRES_USER: riskhub
      POSTGRES_PASSWORD: riskhub_dev
      POSTGRES_DB: riskhub
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riskhub"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - riskhub-network

  redis:
    profiles: ["db-only", "full"]
    image: redis:7-alpine
    container_name: riskhub-redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - riskhub-network

  bootstrap:
    profiles: ["full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend-environment
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-lc", "python -m alembic upgrade head && python -m app.db.seed"]
    networks:
      - riskhub-network

  backend:
    profiles: ["full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: riskhub-backend
    environment: *backend-environment
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - riskhub-network

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: riskhub-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - riskhub-network

volumes:
  postgres_data:

networks:
  riskhub-network:
    driver: bridge
