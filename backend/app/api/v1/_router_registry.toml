# DUAL-ROUTER: risk_questionnaires registers BOTH .risk_router and .router.
# Both are under the /questionnaires tag per the Phase 6 correction.
[[modules]]
module = "risk_questionnaires"
dual_router = true
dual_routes = [
    { router_attr = "risk_router", prefix = "/risks", tags = ["questionnaires"] },
    { router_attr = "router",      prefix = "/questionnaires", tags = ["questionnaires"] },
]

