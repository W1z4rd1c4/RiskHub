# W7 audit adapter matrix.
#
# Derived from docs/BUSINESS_LOGIC.md §9.1 plus adapter-level restore/status
# helpers needed by the current workflow surfaces. Reserved vendor extended
# domains are intentionally excluded until those product domains ship.

