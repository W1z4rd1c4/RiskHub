# Grype suppressions for RiskHub container scanning.
# Keep this list minimal and time-bound.
#
# Required fields for each suppression entry:
# - vulnerability: CVE identifier
# - reason: why accepted, including Owner, Decision, Scanner evidence, and No-fix proof
# - expires-on: YYYY-MM-DD
# - package.name: affected package
# - package.version: affected version (or range rationale in reason)
# - fix-state: optional, e.g. "not-fixed"; omit for CPE matches with an empty scanner fix state.
#
# Example:
# ignore:
#   - vulnerability: CVE-2099-0001
#     reason: "No upstream fix; mitigated by strict egress controls. Owner: Platform."
#     expires-on: 2026-06-30
#     package:
#       name: python
#       version: 3.13.0

ignore:
  - vulnerability: CVE-2026-11940
    reason: "Owner: Platform. Decision: time-bound no-released-fix suppression for a Python 3.13 stdlib CPE match (tarfile.extractall hardlink/symlink filter bypass, gh-151558). Scanner evidence: Grype v0.110.0 backend SBOM binary CPE match for python 3.13.14 (/usr/local/bin/python3.13). No-fix proof: verified upstream 2026-07-02, the 3.13 backport (cpython 771d12dda, 2026-06-23) is NOT in the latest released tag v3.13.14 and no v3.13.15 exists yet, so no fixed python:3.13 base image is published; RiskHub additionally does not use the tarfile module (no `import tarfile`/`extractall` in backend/app or backend/scripts), so the archive-extraction path is unreachable. Exit: bump the base image to python 3.13.15-alpine (or later) once released and remove this entry."
    expires-on: 2026-09-30
    package:
      name: python
      version: 3.13.14
  - vulnerability: CVE-2026-11972
    reason: "Owner: Platform. Decision: time-bound no-released-fix suppression for a Python 3.13 stdlib CPE match (tarfile streaming-mode EOF DoS, gh-151981). Scanner evidence: Grype v0.110.0 backend SBOM binary CPE match for python 3.13.14 (/usr/local/bin/python3.13). No-fix proof: verified upstream 2026-07-02, the 3.13 backport (cpython 3f031d431f80, 2026-06-23) is NOT in the latest released tag v3.13.14 and no v3.13.15 exists yet, so no fixed python:3.13 base image is published; RiskHub additionally does not use the tarfile module (no `import tarfile`/streaming tar parsing in backend/app or backend/scripts), so the archive-parse path is unreachable. Exit: bump the base image to python 3.13.15-alpine (or later) once released and remove this entry."
    expires-on: 2026-09-30
    package:
      name: python
      version: 3.13.14
