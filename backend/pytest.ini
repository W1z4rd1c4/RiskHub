[pytest]
asyncio_mode = auto
testpaths = ../tests/backend/pytest
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=app --cov-report=term-missing --cov-report=html:../tests/results/backend/coverage_html -p no:langsmith_plugin
markers =
    postgres: Tests requiring PostgreSQL database (skip on SQLite)
    slow: Tests that are slow to run
    docker_integration: Tests that require a working local Docker daemon
    redis_integration: Tests that require Docker-backed Redis fault-injection/integration
