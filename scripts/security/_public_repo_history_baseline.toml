# Accepted public-repo history baseline (Option B).
#
# Records the two historical-only findings from `make -f scripts/Makefile
# public-leak-audit` that were reviewed and accepted on 2026-07-01 rather than
# resolved by rewriting git history. See docs/security/SECURITY.md
# ("Accepted public-repo history baseline") for the full decision record.
#
# SCOPE — this baseline applies ONLY to the two historical-only counts:
#   * history_privacy_path_hits  (git-log patch scan, --mode history-patches)
#   * history_runtime_artifacts  (history blob listing)
# It does NOT relax current_tree_gitleaks, history_gitleaks,
# tracked_hygiene_findings, or history_message_privacy_hits — those stay strict
# (0) with no exception.
#
# It is deliberately narrow: a NEW privacy hit (a different local user path, a
# match outside the accepted maintainer-local-path shape, or ANY hit in the
# current tree) and a NEW runtime-artifact blob (any object id not listed here)
# still fail the gate. This records a snapshot; it does not disable the check.

accepted_on = "2026-07-01"
justification = "Historical-only maintainer-local-path noise and labeled dev placeholders; confirmed non-secret (dual gitleaks pass clean). History rewrite rejected as disproportionate for a public repo — see docs/security/SECURITY.md."

# --- history_privacy_path_hits ---------------------------------------------
# Every accepted hit echoes the maintainer's own local user path. A hit whose
# match references any OTHER user, or that does not start with one of these
# prefixes, is treated as NEW and fails the gate. `accepted_count` snapshots
# the current volume: if the number of accepted-shape hits GROWS, the gate
# fails so the increase is reviewed (the baseline is not a blanket mute).
[privacy_paths]
accepted_match_prefixes = [
  "/Users/stefanlesnak/",
  "file:///Users/stefanlesnak/",
]
accepted_count = 4910

# --- history_runtime_artifacts ---------------------------------------------
# Exact blob object-id + path pairs accepted. `git rev-list --objects --all`
# is deterministic per blob content, so any NEW artifact (new content, new
# path, or an object id not listed here) is not covered and fails the gate.
[[runtime_artifacts]]
oid = "1264ea46ef8df66c8a38b26045c9a9cdc8abe507"
path = ".dev-backend.pid"

