# Gitleaks Configuration for RiskHub
# See: https://github.com/gitleaks/gitleaks

title = "RiskHub Secret Detection"

[extend]
# Use default gitleaks rules as base
useDefault = true

[allowlist]
description = "Global allowlist"
regexes = [
    '''your-secret-key-change-in-production-use-env-var''',
    '''your-secret-key-here-min-32-chars''',
    '''SECRET_KEY=abcdefghijklmnopqrstuvwxyz1234567890''',
    '''abcdefghijklmnopqrstuvwxyz1234567890''',
    '''0123456789abcdef0123456789abcdef''',
]
paths = [
    '''(^|/repo/)\.env\.example$''',
    '''package-lock\.json$''',
    '''\.lock$''',
    '''backend/tests/''',
    '''frontend/src/components/risks/riskQuestionnaireQuestions\.ts$''',
    '''(^|/repo/)tests/backend/pytest/test_auth_password_hardening\.py$''',
    '''(^|/repo/)tests/backend/pytest/test_deploy_cli_contracts\.py$''',
    '''(^|/repo/)tests/backend/pytest/test_deploy_renderer_contracts\.py$''',
    '''(^|/repo/)tests/backend/pytest/test_entra_confidential_credentials\.py$''',
    '''(^|/repo/)tests/backend/pytest/test_phase500_script_runtime_contracts\.py$''',
    '''(^|/repo/)tests/backend/pytest/test_settings_secret_files\.py$''',
    '''(^|/repo/)tests/backend/pytest/test_users\.py$''',
    '''(^|/repo/)backend/app/api/v1/endpoints/users/detail\.py$''',
    '''(^|/repo/)\.planning/phases/07-user-management/07-01-PLAN\.md$''',
    '''(^|/repo/)\.planning/phases/07-user-management/07-02-PLAN\.md$''',
    '''(^|/repo/)tests/results/''',
    '''(^|/repo/)\.audit/''',
    '''presentation\.html$''',
    '''node_modules/''',
    '''__pycache__/''',
    '''\.git/''',
    '''\.venv/''',
    '''venv/''',
    '''archive_.*\.zip$''',
    '''\.smart-coding-cache/''',
]
