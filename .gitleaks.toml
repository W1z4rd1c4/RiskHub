# Gitleaks Configuration for RiskHub
# See: https://github.com/gitleaks/gitleaks

title = "RiskHub Secret Detection"

[extend]
# Use default gitleaks rules as base
useDefault = true

# Allow specific patterns that are known false positives
[[rules]]
id = "riskhub-dev-secret"
description = "Allow development placeholder secrets"
regex = '''your-secret-key-change-in-production-use-env-var'''
allowlist = true

[[rules]]
id = "riskhub-example-secret"
description = "Allow example secrets in documentation"
regex = '''your-secret-key-here-min-32-chars'''
allowlist = true

# Files to ignore
[allowlist]
description = "Global allowlist"
paths = [
    '''\.env\.example$''',
    '''\.md$''',
    '''package-lock\.json$''',
    '''\.lock$''',
    '''node_modules/''',
    '''__pycache__/''',
    '''\.git/''',
    '''\.venv/''',
    '''venv/''',
    '''archive_.*\.zip$''',
]
