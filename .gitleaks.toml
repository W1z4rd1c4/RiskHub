# Gitleaks Configuration for RiskHub
# See: https://github.com/gitleaks/gitleaks

title = "RiskHub Secret Detection"

[extend]
# Use default gitleaks rules as base
useDefault = true

[allowlist]
description = "Global allowlist"
regexes = [
    '''your-secret-key-change-in-production-use-env-var''',
    '''your-secret-key-here-min-32-chars''',
    '''SECRET_KEY=abcdefghijklmnopqrstuvwxyz1234567890''',
    '''abcdefghijklmnopqrstuvwxyz1234567890''',
]
paths = [
    '''\.env\.example$''',
    '''\.md$''',
    '''package-lock\.json$''',
    '''\.lock$''',
    '''backend/tests/''',
    '''frontend/src/components/risks/riskQuestionnaireQuestions\.ts$''',
    '''presentation\.html$''',
    '''node_modules/''',
    '''__pycache__/''',
    '''\.git/''',
    '''\.venv/''',
    '''venv/''',
    '''archive_.*\.zip$''',
    '''\.smart-coding-cache/''',
]
